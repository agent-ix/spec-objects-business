manifest_version: 1.0.0
name: spec-objects-business
version: 0.2.0
description: 'Filament Module: tier-2 business ObjectTypes (DDD: domain, entity, value_object, aggregate_root, repository, event, state_machine, process, enumeration)'
nav:
  category:
    slug: business
    label: Business
    icon: Boxes
    order: 51
archetypes: []
grammars: []
artifact_types: []
lint_rules: []
object_types:
- name: domain
  allowed_links:
    contains: [entity, aggregate_root, value_object, repository, event, state_machine, process, enumeration]
  data_schema:
    type: object
  body_extraction:
    yield_pattern:
      match:
        id: &id001
          from: frontmatter_field
          path:
          - id
          required: true
        title: &id002
          from: frontmatter_field
          path:
          - title
          required: true
        type: &id003
          from: frontmatter_field
          path:
          - type
          required: true
        # Format-walkthrough decision #18 (2026-06-11): Bounded Context
        # is the domain object's required kernel (20/20 wild domain FRs
        # carry it; 0/20 had '## Entities'). `entities` is an OPTIONAL
        # summary — entities are first-class `entity` FRs linked via
        # `contains` edges, never duplicated inline. The optional `erd`
        # extracts the whole-domain mermaid diagram.
        bounded_context:
          from: section_body
          after_heading: Bounded Context
          required: true
        entities:
          from: section_body
          after_heading: Entities
          required: false
        erd:
          from: code_block
          after_heading: Entity Relationship Diagram
          language: mermaid
          required: false
        ubiquitous_language:
          from: section_body
          after_heading: Ubiquitous Language
          required: false
- name: entity
  roles: [domain-object, persistable]
  allowed_links:
    contains: [nested_entity, value_object]
    owns: [state_machine]
    references: [entity, aggregate_root, enumeration]
  data_schema:
    type: object
  body_extraction:
    yield_pattern:
      match:
        id: *id001
        title: *id002
        type: *id003
        properties:
          from: section_body
          after_heading: Properties
          required: true
- name: value_object
  roles: [domain-object]
  allowed_links:
    composes: [value_object, enumeration]
    references: [enumeration]
  data_schema:
    type: object
  body_extraction:
    yield_pattern:
      match:
        id: *id001
        title: *id002
        type: *id003
        properties:
          from: section_body
          after_heading: Properties
          required: true
        fields:
          from: section_body
          after_heading: Fields
          required: false
- name: aggregate_root
  roles: [domain-object, persistable]
  allowed_links:
    aggregates: [entity, nested_entity]
    contains: [value_object]
    emits: [event]
    references: [aggregate_root, enumeration]
  data_schema:
    type: object
  body_extraction:
    yield_pattern:
      match:
        id: *id001
        title: *id002
        type: *id003
        members:
          from: section_body
          after_heading: Members
          required: true
- name: nested_entity
  roles: [domain-object]
  allowed_links:
    contains: [value_object]
    references: [enumeration]
  data_schema:
    type: object
  body_extraction:
    yield_pattern:
      match:
        id: *id001
        title: *id002
        type: *id003
        parent:
          from: section_body
          after_heading: Parent
          required: true
- name: repository
  allowed_links:
    persists: [aggregate_root, entity]
    references: [data_schema]
  data_schema:
    type: object
  body_extraction:
    yield_pattern:
      match:
        id: *id001
        title: *id002
        type: *id003
        operations:
          from: section_body
          after_heading: Operations
          required: true
- name: event
  roles: [event-like]
  allowed_links:
    carries: [value_object, entity]
    references: [aggregate_root, enumeration]
  data_schema:
    type: object
  body_extraction:
    yield_pattern:
      match:
        id: *id001
        title: *id002
        type: *id003
        schema_json:
          from: code_block
          after_heading: Schema
          required: true
          language: json
- name: state_machine
  allowed_links:
    transitions_to: [state_machine]
    raises: [event]
    references: [enumeration]
  data_schema:
    type: object
  body_extraction:
    yield_pattern:
      match:
        id: *id001
        title: *id002
        type: *id003
        diagram:
          from: code_block
          after_heading: States & Transitions
          required: true
          language: mermaid
- name: process
  roles: [measurable]
  allowed_links:
    triggers: [process, action]
    consumes: [event]
    emits: [event]
    reads: [aggregate_root, entity]
    writes: [aggregate_root, entity]
    operates_on: [domain-object]
  data_schema:
    type: object
  body_extraction:
    yield_pattern:
      match:
        id: *id001
        title: *id002
        type: *id003
        # Format-walkthrough decision #13 (2026-06-11): `multiple: true`
        # keeps EVERY Workflow diagram (complex flows split into several
        # smaller diagrams instead of one oversized one); the optional
        # `states` anchor types state diagrams separately.
        diagram:
          from: code_block
          after_heading: Workflow
          required: true
          multiple: true
          language: mermaid
        states:
          from: code_block
          after_heading: States
          required: false
          multiple: true
          language: mermaid
        specification:
          from: section_body
          after_heading: Specification
          required: false
        algorithm:
          from: section_body
          after_heading: Algorithm
          required: false
- name: enumeration
  allowed_links:
    references: [enumeration]
  data_schema:
    type: object
  body_extraction:
    yield_pattern:
      match:
        id: *id001
        title: *id002
        type: *id003
        # Format-walkthrough decision #7 (2026-06-11): controlled label
        # vocabularies (codec kinds, surface labels, ISA labels, step
        # kinds) as first-class extractable objects instead of prose or
        # values smuggled into data_schema JSON.
        values_table:
          from: table_row
          under_section: Values
          required: true
          assert:
            columns:
            - Value
            - Description
            min_rows: 1
